name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=research_engine -q

  lint:
    name: Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Verify imports
        run: |
          python -c "from research_engine.parsers import load_all, validate_study_dir"
          python -c "from research_engine.analysis import full_reliability"
          python -c "from research_engine.exporters import export_word, export_spss_syntax"
          python -c "from research_engine.workflow import Pipeline"
          echo "All imports OK"
